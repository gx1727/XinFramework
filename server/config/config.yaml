app:
  name: xin
  env: dev # dev prod
  host: 0.0.0.0
  port: 8087

database:
  host: localhost
  port: 5432
  user: xin_user
  password: xin_password
  dbname: xin
  sslmode: disable
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime_sec: 300
  conn_max_idle_time_sec: 60

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

  # enabled=false ：Redis 完全关闭，不初始化客户端
  # enabled=true && required=false ：Redis 不可用时降级继续启动
  # enabled=true && required=true ：Redis 不可用时启动失败（更严格）
  enabled: true
  required: false
  pool_size: 20
  min_idle_conns: 5
  pool_timeout_sec: 4
  idle_timeout_sec: 300
  max_conn_age_sec: 0

jwt:
  # 开发环境可保留占位值；prod 环境 config.Load 会拒绝占位 / 空 / < 32 字节。
  # 生产部署务必通过 XIN_JWT_SECRET 环境变量注入一个 ≥32 字节的随机串。
  # 生成示例：openssl rand -base64 48
  secret: your-secret-key
  expire: 3600
  refresh_expire: 86400

storage:
  provider: local # local | cos
  local_dir: ./uploads
  local_base_url: /uploads
  cos_url: https://xin-1303413944.cos.ap-shanghai.myqcloud.com
  cos_secret_id: ""  # 通过环境变量 XIN_STORAGE_COS_SECRET_ID 注入
  cos_secret_key: "" # 通过环境变量 XIN_STORAGE_COS_SECRET_KEY 注入
  cos_base_url: https://img.gx1727.com

log:
  dir: logs
  level: info # debug | info | warn | error

# module: 白名单 —— 列出本部署需要启用的全部业务模块。
# 实际启动列表 = alwaysOn（system/auth/tenant，自动启用、不可关） + 本列表。
# "module: 删一行" 即可关闭对应模块（除 alwaysOn 外）。
# 可选范围（与 cmd/xin/main.go 的 side-effect import 对齐）：
#   boot/      : auth, tenant
#   rbac/      : menu, user, role, resource, organization, permission
#   reference/ : dict, asset, weixin
#   apps/      : system, cms, flag
module:
  - menu
  - user
  - role
  - resource
  - organization
  - dict
  - asset
  - permission
  - weixin
  - cms
  - flag

cors:
  enabled: true
  # 允许的来源，支持两种写法：
  # 1. YAML 数组（推荐）：
  #   allow_origins:
  #     - https://admin.mi7.com
  #     - https://app.mi7.com
  # 2. 单个通配符：
  #   allow_origins: 
  #   - "*"
  allow_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5241"
  # 允许的请求方法
  allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  # 允许的请求头
  allow_headers: "Content-Type,Authorization,X-Requested-With,X-Request-ID,X-Tenant-ID"
  # 是否允许携带凭证（Cookie/Authorization header）
  # 注意：allow_credentials=true 时，allow_origins 不能为 "*"
  allow_credentials: true
  # 预检请求缓存时间（秒）
  max_age: 86400

user:
  max_login_attempts: 5
  lock_duration_sec: 300
  password_policy: standard
  token_expire_sec: 3600
  refresh_token_expire_sec: 86400


weixin:
  # ⚠️  仅供 dev 调试。生产部署务必清空下面两个值，改用环境变量：
  #     XIN_WEIXIN_APPID / XIN_WEIXIN_APPSECRET
  # 该段被 apps/reference/weixin 通过 config.LoadModule("weixin", ...) 读取。
  appid: wx3e18aa16ef3c9ea9
  appsecret: 87cbb533602cde12e30094df147783fb
