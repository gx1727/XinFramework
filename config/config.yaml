app:
  name: xin
  env: dev # dev prod
  host: 0.0.0.0
  port: 8080

database:
  host: localhost
  port: 5432
  user: xin_user
  password: xin_password
  dbname: xin
  sslmode: disable
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime_sec: 300
  conn_max_idle_time_sec: 60

redis:
  host: 192.168.151.176
  port: 6379
  password: ""
  db: 0

  # enabled=false ：Redis 完全关闭，不初始化客户端
  # enabled=true && required=false ：Redis 不可用时降级继续启动
  # enabled=true && required=true ：Redis 不可用时启动失败（更严格）
  enabled: true
  required: false
  pool_size: 20
  min_idle_conns: 5
  pool_timeout_sec: 4
  idle_timeout_sec: 300
  max_conn_age_sec: 0

jwt:
  secret: your-secret-key
  expire: 3600
  refresh_expire: 86400

saas:
  mode: saas # single | saas | schema | database

log:
  dir: logs
  level: info # debug | info | warn | error

module:
  - menu
  - tenant
  - user
  - role
  - resource
  - organization
  - dict
  - permission
  - auth
  - weixin

apps:
  - cms

cors:
  enabled: true
  # 允许的来源，支持两种写法：
  # 1. YAML 数组（推荐）：
  #   allow_origins:
  #     - https://admin.mi7.com
  #     - https://app.mi7.com
  # 2. 单个通配符：
  #   allow_origins: 
  #   - "*"
  allow_origins:
    - "http://localhost:5173"
  # 允许的请求方法
  allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  # 允许的请求头
  allow_headers: "Content-Type,Authorization,X-Requested-With,X-Request-ID,X-Tenant-ID"
  # 是否允许携带凭证（Cookie/Authorization header）
  # 注意：allow_credentials=true 时，allow_origins 不能为 "*"
  allow_credentials: true
  # 预检请求缓存时间（秒）
  max_age: 86400

user:
  max_login_attempts: 5
  lock_duration_sec: 300
  password_policy: standard
  token_expire_sec: 3600
  refresh_token_expire_sec: 86400


